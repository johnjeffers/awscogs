---
deployment:
  replicas: 1
  image: jjeffers/awscogs:v0.1.0
  resources: {}
  env: {}

ingress:
  enable: false
  host: awscogs.example.com

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/awscogs

# Frontend config.yaml content (optional). When set, creates a ConfigMap
# mounted into the container at /etc/awscogs/config.yaml and served at /config.yaml.
# frontendConfig: |
#   exclude:
#     accounts:
#       names:
#         - "example-vendor*"
#         - "*logs*"
#     regions:
#       - ap-east-1
