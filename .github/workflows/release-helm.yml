name: Release Helm Chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release-helm:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null)
            if [ -z "$TAG" ]; then
              echo "::error::No v* tags found"
              exit 1
            fi
            git checkout "$TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$ACTOR" --password-stdin

      - name: Set chart version from tag
        id: version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log resolved tag
        run: echo "Releasing chart version ${{ steps.version.outputs.version }} from tag ${{ steps.tag.outputs.tag }}"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: ${{ steps.version.outputs.version }}/" helm/Chart.yaml || \
            echo "appVersion: ${{ steps.version.outputs.version }}" >> helm/Chart.yaml

      - name: Package chart
        run: helm package helm/

      - name: Push chart to GHCR
        run: helm push "awscogs-${{ steps.version.outputs.version }}.tgz" "oci://ghcr.io/$OWNER/charts"
